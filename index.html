<!DOCTYPE html>
<script>

     /* let playerSelection;
    let computerSelection;*/

   //Returns a string (rock, paper of scissors) for the computer based a randomly generated number
    function computerPlay () { 
        let randomNumber = Math.random();
        if (randomNumber < 1/3) {
            computerSelection = 'rock';
        } else if (randomNumber > 2/3) {
            computerSelection = 'paper';
        } else {
            computerSelection = 'scissors';
        }
        return computerSelection;
    }

    //Player's selection and computer's selection passed in as variables
    //Function outlines player's win, loss, and draw conditions based on player's selection and computer's selection
    //Prints player result in conosle and Returns the player's result
    function singleGame (playerSelection, computerSelection) { 
        if (playerSelection === 'scissors' && computerSelection === 'paper'
        || playerSelection === 'paper' && computerSelection === 'rock'
        || playerSelection === 'rock' && computerSelection == 'scissors') {
            console.log(`You Win! ${ playerSelection } beats ${ computerSelection }!`)
            return 'playerWin';
        } else if (playerSelection === computerSelection) {
            console.log('Draw');
            return 'draw';
        } else {
            console.log(`You Lose! ${computerSelection} beats ${ playerSelection }!`)
            return 'playerLose'
        }
    }

    //Calls the singleGame function five times, and checks to see if the player won, lost or drew even with computer
    //Increments player's and computer's wins and prints the number of wins for both player and computer
    function game() {
        let playerWins = 0;
        let computerWins = 0;
        let outcome;
        for (let i = 0; i < 5; i++) {
            outcome = singleGame(prompt().toLowerCase(), computerPlay());
            if (outcome === 'playerWin') {
                ++playerWins;
            } else if (outcome == 'playerLose') {
                ++computerWins;
            }
        }
        console.log(`Player: ${ playerWins }, Computer: ${ computerWins }`);
    }

    //calls the game function
    game();
</script>
