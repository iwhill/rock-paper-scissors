<body>
    <button id="rock">Rock</button>
    <button id="paper">Paper</button>
    <button id="scissors">Scissors</button>

    <div id="container">

    </div>

    <script>
       
        //Returns a string (rock, paper of scissors) for the computer based a randomly generated number
        function computerPlay () { 
            let randomNumber = Math.random();
            if (randomNumber < 1/3) {
                computerSelection = 'rock';
            } else if (randomNumber > 2/3) {
                computerSelection = 'paper';
            } else {
                computerSelection = 'scissors';
            }
            return computerSelection;
        }
       
        //Player's selection and computer's selection passed in as variables
        //Function outlines player's win, loss, and draw conditions based on player's selection and computer's selection
        //Prints player result in conosle and Returns the player's result
        function playRound (playerSelection, computerSelection) { 
            let p = document.createElement('p');
            if (playerSelection === 'scissors' && computerSelection === 'paper'
            || playerSelection === 'paper' && computerSelection === 'rock'
            || playerSelection === 'rock' && computerSelection == 'scissors') {
                win++;
                p.textContent = `You Win! ${ playerSelection } beats ${ computerSelection }!\ 
                            Score: ${ win } - ${ lose }`;
                container.appendChild(p);
            } else if (playerSelection === computerSelection) {
                p.textContent = `Draw.\ 
                            Score: ${ win } - ${ lose }`;
                container.appendChild(p);
            } else {
                lose++;
                p.textContent = `You Lose! ${computerSelection} beats ${ playerSelection }!\ 
                            Score: ${ win } - ${ lose }`;
                container.appendChild(p);
            }    
        }

        function checkWin(a, b) {
            let p1 = document.createElement('p');
            if (a === 5) {
                p1.textContent = 'Player wins!';
                container.appendChild(p1);
            } else if (b === 5) {
                p1.textContent = 'Computer wins!';
                container.appendChild(p1);
            }
        }

        //Increments player's and computer's wins and prints the number of wins for both player and computer

        const container = document.querySelector('#container');
        let win = 0;
        let lose = 0;
        const buttons = document.querySelectorAll('button');
        buttons.forEach((button) => {
            button.addEventListener("click", () => {
                playRound(button.id, computerPlay());
                checkWin(win, lose);
        });
    });
